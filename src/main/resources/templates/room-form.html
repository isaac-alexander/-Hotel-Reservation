<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Room</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/sidebar :: sidebar"></div>

<div class="main-content">

    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="card p-4 col-md-6 mx-auto">

        <h3>Create Room</h3>

        <form th:action="@{/rooms/new}" th:object="${room}" method="post">

            <select th:field="*{roomType}" class="form-control mb-2" required>
                <option value="">Select type</option>
                <option value="SINGLE">Single</option>
                <option value="STUDIO">Studio</option>
                <option value="QUEEN">Queen</option>
                <option value="KING">King</option>
            </select>

            <input th:field="*{price}" class="form-control mb-2" required placeholder="Price">

            <input th:field="*{description}" class="form-control mb-2" required placeholder="Description">

            <button class="btn btn-success w-100">SAVE</button>

        </form>

    </div>

</div>

</body>
</html>
