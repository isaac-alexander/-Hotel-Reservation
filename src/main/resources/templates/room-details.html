<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Room Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/sidebar :: sidebar"></div>

<div class="main-content">

    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="card p-4 shadow">

        <h3 class="fw-bold" th:text="${room.roomType}"></h3>
        <p class="text-muted" th:text="${room.description}"></p>

        <p><strong>PRICE:</strong> ₦<span th:text="${room.price}"></span></p>

        <p th:if="${room.available}" class="text-success fw-bold">AVAILABLE</p>
        <p th:if="${!room.available}" class="text-danger fw-bold">UNAVAILABLE</p>

        <!-- CUSTOMER -->
        <a sec:authorize="hasRole('CUSTOMER')"
           th:if="${room.available}"
           th:href="@{'/bookings/new/' + ${room.id}}"
           class="btn btn-success w-100 mt-3">
            BOOK NOW
        </a>

        <!-- ADMIN -->
        <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-2 mt-3">
            <a th:href="@{'/rooms/edit/' + ${room.id}}" class="btn btn-warning w-50">EDIT</a>
            <a th:href="@{'/rooms/delete/' + ${room.id}}" class="btn btn-danger w-50">DELETE</a>
        </div>

        <a href="/dashboard" class="btn btn-secondary mt-3 w-100">
            BACK TO HOME
        </a>

    </div>

</div>

</body>
</html>
