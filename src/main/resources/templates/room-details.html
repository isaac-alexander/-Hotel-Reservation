<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Room Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="sidebar">
    <h4>HOUSE OF ACE HOTEL</h4>
    <a href="/dashboard">HOME</a>
    <a href="/rooms">ROOMS</a>
    <a href="/bookings/history">BOOKING HISTORY</a>
    <a th:if="${user.role == 'admin'}" href="/rooms/new">MANAGE ROOMS</a>
    <hr>
    <a href="/logout">LOGOUT</a>
</div>

<div class="main-content">

    <div class="card p-4 shadow">

        <h3 class="fw-bold" th:text="${room.roomType}"></h3>
        <p class="text-muted" th:text="${room.description}"></p>

        <p><strong>PRICE:</strong> ₦<span th:text="${room.price}"></span></p>

        <p th:if="${room.available}" class="text-success fw-bold">AVAILABLE</p>
        <p th:if="${!room.available}" class="text-danger fw-bold">UNAVAILABLE</p>

        <!-- CUSTOMER -->
        <a th:if="${user.role == 'customer' and room.available}"
           th:href="@{'/bookings/new/' + ${room.id}}"
           class="btn btn-success w-100 mt-3">
            BOOK NOW
        </a>

        <!-- ADMIN -->
        <div th:if="${user.role == 'admin'}" class="d-flex gap-2 mt-3">
            <a th:href="@{'/rooms/edit/' + ${room.id}}" class="btn btn-warning w-50">EDIT</a>
            <a th:href="@{'/rooms/delete/' + ${room.id}}" class="btn btn-danger w-50">DELETE</a>
        </div>

        <a href="/dashboard" class="btn btn-secondary mt-3 w-100">
            BACK TO HOME
        </a>

    </div>

</div>

</body>
</html>
