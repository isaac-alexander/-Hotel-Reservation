<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>room details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h3 th:text="${room.roomType}"></h3>

        <p th:text="${room.description}"></p>

        <p><strong>price:</strong> <span th:text="${room.price}"></span></p>

        <p th:if="${room.available}" class="text-success">available</p>
        <p th:if="${!room.available}" class="text-danger">unavailable</p>

        <!-- customer booking -->
        <a th:if="${user.role == 'customer' and room.available}"
           th:href="@{'/rooms/book/' + ${room.id}}"
           class="btn btn-outline-success">
            book now
        </a>

        <!-- admin controls -->
        <div th:if="${user.role == 'admin'}" class="mt-3">

            <a th:href="@{'/rooms/edit/' + ${room.id}}"
               class="btn btn-outline-warning">
                edit
            </a>

            <a th:href="@{'/rooms/delete/' + ${room.id}}"
               class="btn btn-outline-danger">
                delete
            </a>

        </div>

        <a href="/rooms" class="btn btn-outline-secondary mt-3">
            back
        </a>

    </div>

</div>

</body>
</html>
