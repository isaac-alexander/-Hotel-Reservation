<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>rooms</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="sidebar">
    <h4>GPH</h4>
    <a href="/dashboard">dashboard</a>
    <a href="/rooms">rooms</a>
    <a href="/bookings/history">booking history</a>
    <a th:if="${user.role == 'admin'}" href="/rooms/new">manage rooms</a>
    <hr>
    <a href="/logout">logout</a>
</div>

<div class="main-content">

    <h3>all rooms</h3>

    <div class="row">

        <div class="col-md-4" th:each="room : ${rooms}">

            <div class="card p-3 shadow mb-3">

                <h5 th:text="${room.roomType}"></h5>
                <p th:text="${room.description}"></p>

                <p><strong>price:</strong> <span th:text="${room.price}"></span></p>

                <p th:if="${room.available}" class="text-success">available</p>
                <p th:if="${!room.available}" class="text-danger">unavailable</p>

                <a th:href="@{'/rooms/' + ${room.id}}" class="btn btn-dark btn-sm mb-2">
                    view
                </a>

                <a th:if="${user.role == 'customer' and room.available}"
                   th:href="@{'/bookings/new/' + ${room.id}}"
                   class="btn btn-success btn-sm">book</a>

                <button th:if="${user.role == 'customer' and !room.available}"
                        class="btn btn-secondary btn-sm" disabled>unavailable</button>

                <div th:if="${user.role == 'admin'}">
                    <a th:href="@{'/rooms/edit/' + ${room.id}}" class="btn btn-warning btn-sm">edit</a>
                    <a th:href="@{'/rooms/delete/' + ${room.id}}" class="btn btn-danger btn-sm">delete</a>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
