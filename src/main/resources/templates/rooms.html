<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>rooms</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2 class="mb-3">all rooms</h2>

    <!-- admin add button -->
    <a th:if="${user.role == 'admin'}"
       href="/rooms/new"
       class="btn btn-outline-primary mb-3">
        add room
    </a>

    <div class="row">

        <div class="col-md-4" th:each="room : ${rooms}">

            <div class="card p-3 shadow mb-3">

                <h5 th:text="${room.roomType}"></h5>

                <p th:text="${room.description}"></p>

                <p><strong>price:</strong> <span th:text="${room.price}"></span></p>

                <!-- availability -->
                <p th:if="${room.available}" class="text-success">available</p>
                <p th:if="${!room.available}" class="text-danger">unavailable</p>

                <!-- view details -->
                <a th:href="@{'/rooms/' + ${room.id}}"
                   class="btn btn-outline-dark btn-sm mb-2">
                    view details
                </a>

                <!-- CUSTOMER BUTTON -->
                <a th:if="${user.role == 'customer' and room.available}"
                   th:href="@{'/rooms/book/' + ${room.id}}"
                   class="btn btn-outline-success btn-sm">
                    book now
                </a>

                <button th:if="${user.role == 'customer' and !room.available}"
                        class="btn btn-secondary btn-sm" disabled>
                    unavailable
                </button>

                <!-- ADMIN BUTTONS -->
                <div th:if="${user.role == 'admin'}" class="mt-2">

                    <a th:href="@{'/rooms/edit/' + ${room.id}}"
                       class="btn btn-outline-warning btn-sm">
                        edit
                    </a>

                    <a th:href="@{'/rooms/delete/' + ${room.id}}"
                       class="btn btn-outline-danger btn-sm">
                        delete
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
