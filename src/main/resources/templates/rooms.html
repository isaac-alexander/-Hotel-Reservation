<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Rooms</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="sidebar">
    <h4>HOUSE OF ACE HOTEL</h4>
    <a href="/dashboard">HOME</a>
    <a href="/rooms">ROOMS</a>
    <a href="/bookings/history">BOOKING HISTORY</a>
    <a th:if="${user.role == 'admin'}" href="/rooms/new">MANAGE ROOMS</a>
    <hr>
    <a href="/logout">LOGOUT</a>
</div>

<div class="main-content">

    <h3>ALL ROOMS</h3>

    <div class="row">

        <div class="col-md-4" th:each="room : ${rooms}">

            <div class="card p-3 shadow mb-3">

                <h5 class="fw-bold" th:text="${room.roomType}"></h5>
                <p class="text-muted" th:text="${room.description}"></p>

                <p><strong>PRICE:</strong> ₦<span th:text="${room.price}"></span></p>

                <p th:if="${room.available}" class="text-success fw-bold">AVAILABLE</p>
                <p th:if="${!room.available}" class="text-danger fw-bold">UNAVAILABLE</p>

                <a th:href="@{'/rooms/' + ${room.id}}" class="btn btn-outline-dark btn-sm mb-2 w-100">
                    VIEW DETAILS
                </a>

                <!-- CUSTOMER -->
                <a th:if="${#strings.equalsIgnoreCase(user.role, 'customer') and room.available}"
                   th:href="@{'/bookings/new/' + ${room.id}}"
                   class="btn btn-success w-100 mb-2">
                    BOOK NOW
                </a>

                <button th:if="${user.role == 'customer' and !room.available}"
                        class="btn btn-secondary w-100 mb-2" disabled>
                    NOT AVAILABLE
                </button>

                <!-- ADMIN -->
                <div th:if="${user.role == 'admin'}" class="d-flex gap-2">
                    <a th:href="@{'/rooms/edit/' + ${room.id}}" class="btn btn-warning w-50">EDIT</a>
                    <a th:href="@{'/rooms/delete/' + ${room.id}}" class="btn btn-danger w-50">DELETE</a>
                </div>

            </div>
        </div>

    </div>

</div>

</body>
</html>
