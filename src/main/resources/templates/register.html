<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- custom css -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">

                <!-- title -->
                <h3 class="text-center mb-4">REGISTER</h3>

                <!-- success message -->
                <div th:if="${success}" class="alert alert-success text-center" id="successMsg">
                    <span th:text="${success}"></span>
                </div>

                <!-- form -->
                <form th:action="@{/register}" th:object="${user}" method="post">

                    <!-- name -->
                    <div class="mb-3">
                        <label>name</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="enter name" required>
                    </div>

                    <!-- email -->
                    <div class="mb-3">
                        <label>email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="enter email" required>
                    </div>

                    <!-- password -->
                    <div class="mb-3">
                        <label>password</label>
                        <input type="password" th:field="*{password}" class="form-control" placeholder="enter password" required>
                    </div>

                    <!-- button -->
                    <button class="btn btn-primary w-100">REGISTER</button>

                </form>

                <!-- login link -->
                <a href="/login" class="d-block text-center mt-3">
                    already have an account? login
                </a>

            </div>

        </div>
    </div>

</div>

<!-- auto hide success -->
<script>
    setTimeout(() => {
        let msg = document.getElementById("successMsg");
        if (msg) msg.style.display = "none";
    }, 5000);
</script>

</body>
</html>
