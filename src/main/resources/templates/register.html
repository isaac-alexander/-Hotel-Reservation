<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>register</title>

    <!-- bootstrap css from cdn -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <!-- centered card -->
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-body">

                    <h3 class="text-center mb-4">register user</h3>

                    <form th:action="@{/users/register}" th:object="${user}" method="post">

                        <div class="mb-3">
                            <label class="form-label">name</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="enter name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="enter email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">password</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="enter password">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            register
                        </button>

                        <!-- login link -->
                        <a href="/users/login" class="d-block text-center mt-3">
                            Already have an account? Login
                        </a>

                    </form>

                    <!-- success message -->
                    <div th:if="${param.success}" class="alert alert-success mt-3">
                        user registered successfully
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
