<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Booking History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>HOUSE OF ACE HOTEL</h4>

    <a href="/dashboard">HOME</a>
    <a href="/rooms">ROOMS</a>
    <a href="/bookings/history">BOOKING HISTORY</a>

    <!-- only admin sees manage rooms -->
    <a th:if="${user.role == 'admin'}" href="/rooms/new">MANAGE ROOMS</a>

    <hr>
    <a href="/logout" class="text-danger">LOGOUT</a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>BOOKING HISTORY</h3>

        <span>
            Welcome
            <b th:text="${#strings.toUpperCase(user.name)}"></b>
        </span>
    </div>

    <!-- TABLE CARD -->
    <div class="card shadow p-4">

        <table class="table table-hover align-middle">

            <thead class="table-dark">
            <tr>
                <th>ROOM ID</th>
                <th>CHECK IN</th>
                <th>CHECK OUT</th>
                <th>STATUS</th>

                <!-- only admin/receptionist sees customer name -->
                <th th:if="${user.role == 'admin' or user.role == 'receptionist'}">
                    CUSTOMER NAME
                </th>

                <th>CHECK-IN TIME</th>
                <th>CHECK-OUT TIME</th>

                <!-- receptionist actions -->
                <th th:if="${user.role == 'admin' or user.role == 'receptionist'}">
                    ACTIONS
                </th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="b : ${bookings}">

                <!-- room id -->
                <td th:text="${b.roomId}"></td>

                <!-- dates -->
                <td th:text="${b.checkIn}"></td>
                <td th:text="${b.checkOut}"></td>

                <!-- booking status -->
                <td th:text="${b.status}"></td>

                <!-- customer name (admin/receptionist only) -->
                <td th:if="${user.role == 'admin' or user.role == 'receptionist'}"
                    th:text="${b.user.name}">
                </td>

                <!-- check-in time -->
                <td th:text="${b.checkInTime}"></td>

                <!-- check-out time -->
                <td th:text="${b.checkOutTime}"></td>

                <!-- actions (receptionist/admin only) -->
                <td th:if="${user.role == 'admin' or user.role == 'receptionist'}">

                    <!-- confirm booking -->
                    <a th:href="@{'/bookings/confirm/' + ${b.id}}"
                       class="btn btn-sm btn-success mb-1">
                        Confirm
                    </a>

                    <!-- check in -->
                    <a th:href="@{'/bookings/checkin/' + ${b.id}}"
                       class="btn btn-sm btn-primary mb-1">
                        Check In
                    </a>

                    <!-- check out -->
                    <a th:href="@{'/bookings/checkout/' + ${b.id}}"
                       class="btn btn-sm btn-warning">
                        Check Out
                    </a>

                </td>

            </tr>

            </tbody>
        </table>

        <!-- EMPTY STATE -->
        <div th:if="${#lists.isEmpty(bookings)}"
             class="text-center text-muted mt-3">
            NO BOOKINGS FOUND
        </div>

        <!-- BACK BUTTON -->
        <a href="/dashboard" class="btn btn-dark mt-3">
            BACK TO DASHBOARD
        </a>

    </div>
</div>

</body>
</html>
