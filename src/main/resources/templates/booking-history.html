<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Booking History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/sidebar :: sidebar"></div>

<div class="main-content">

    <div th:replace="fragments/navbar :: navbar"></div>

    <h4>BOOKING HISTORY</h4>

    <div class="card p-3 shadow-sm table-responsive">

        <table class="table table-hover">

            <thead class="table-dark">
            <tr>
                <th>Room</th>
                <th>Check In</th>
                <th>Check Out</th>
                <th>Status</th>
                <th>Code</th>
                <th>Total Price</th>

                <th sec:authorize="hasAnyRole('ADMIN','RECEPTIONIST')">Customer</th>                <th>Actions</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="b : ${bookings}">

                <td th:text="${b.roomId}"></td>
                <td th:text="${b.checkIn}"></td>
                <td th:text="${b.checkOut}"></td>
                <td th:text="${b.status}"></td>
                <td th:text="${b.bookingCode}"></td>
                <td th:text="${b.totalPrice}"></td>

                <td sec:authorize="hasAnyRole('ADMIN','RECEPTIONIST')"
                    th:text="${b.user.name}">
                </td>

                <td>

                    <!-- UPDATE - ONLY SHOW FOR PENDING -->

                <td>

                    <!-- CONFIRM -->
                    <form th:action="@{'/bookings/confirm/' + ${b.id}}"
                          method="post"
                          sec:authorize="hasAnyRole('ADMIN','RECEPTIONIST')"
                          th:if="${b.status == 'PENDING'}"
                          style="display:inline;">
                        <button class="btn btn-success btn-sm">Confirm</button>
                    </form>

                    <!-- REJECT -->
                    <form th:action="@{'/bookings/reject/' + ${b.id}}"
                          method="post"
                          sec:authorize="hasAnyRole('ADMIN','RECEPTIONIST')"
                          th:if="${b.status == 'PENDING'}"
                          style="display:inline;">
                        <button class="btn btn-danger btn-sm">Reject</button>
                    </form>

                    <!-- CANCEL -->
                    <form th:action="@{'/bookings/cancel/' + ${b.id}}"
                          method="post"
                          sec:authorize="hasRole('CUSTOMER')"
                          th:if="${b.status == 'PENDING'}"
                          style="display:inline;">
                        <button class="btn btn-warning btn-sm">Cancel</button>
                    </form>

                    <!-- CHECK IN -->
                    <form th:action="@{'/bookings/checkin/' + ${b.id}}"
                          method="post"
                          sec:authorize="hasRole('RECEPTIONIST')"
                          th:if="${b.status == 'CONFIRMED'}"
                          style="display:inline;">
                        <button class="btn btn-primary btn-sm">Check In</button>
                    </form>

                    <!-- CHECK OUT -->
                    <form th:action="@{'/bookings/checkout/' + ${b.id}}"
                          method="post"
                          sec:authorize="hasRole('RECEPTIONIST')"
                          th:if="${b.status == 'CHECKED_IN'}"
                          style="display:inline;">
                        <button class="btn btn-warning btn-sm">Check Out</button>
                    </form>

                </td>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
