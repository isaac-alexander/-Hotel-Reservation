<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Booking History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>HOUSE OF ACE HOTEL</h4>
    <a href="/dashboard">HOME</a>
    <a href="/rooms">ROOMS</a>
    <a href="/bookings/history">BOOKING HISTORY</a>
    <a th:if="${user.role == 'admin'}" href="/rooms/new">MANAGE ROOMS</a>
    <hr>
    <a href="/logout" class="text-danger">LOGOUT</a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>BOOKING HISTORY</h3>
        <span>Welcome <b th:text="${#strings.toUpperCase(user.name)}"></b></span>
    </div>

    <!-- CARD -->
    <div class="card shadow p-4">

        <table class="table table-hover align-middle">

            <thead class="table-dark">
            <tr>
                <th>ROOM ID</th>
                <th>CHECK IN</th>
                <th>CHECK OUT</th>
                <th th:if="${user.role == 'admin'}">USER ID</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="b : ${bookings}">

                <td th:text="${b.roomId}"></td>
                <td th:text="${b.checkIn}"></td>
                <td th:text="${b.checkOut}"></td>

                <td th:if="${user.role == 'admin'}"
                    th:text="${b.userId}"></td>

            </tr>

            </tbody>

        </table>

        <!-- EMPTY STATE -->
        <div th:if="${#lists.isEmpty(bookings)}" class="text-center mt-3 text-muted">
            NO BOOKINGS FOUND
        </div>

        <!-- ACTION -->
        <a href="/rooms" class="btn btn-dark mt-3">
            BOOK A ROOM
        </a>

    </div>

</div>

</body>
</html>
