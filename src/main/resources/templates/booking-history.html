<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>booking history</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">booking history</h2>

    <table class="table table-bordered table-striped">

        <thead>
        <tr>
            <th>room id</th>
            <th>check in</th>
            <th>check out</th>
            <th th:if="${user.role == 'admin'}">user id</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="b : ${bookings}">

            <td th:text="${b.roomId}"></td>
            <td th:text="${b.checkIn}"></td>
            <td th:text="${b.checkOut}"></td>

            <!-- admin only -->
            <td th:if="${user.role == 'admin'}"
                th:text="${b.userId}"></td>

        </tr>

        </tbody>

    </table>

    <a href="/dashboard" class="btn btn-outline-secondary mt-3">
        back to dashboard
    </a>

</div>

</body>
</html>
