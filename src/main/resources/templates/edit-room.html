<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>edit room</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">

                <h3 class="mb-3 text-center">edit room</h3>

                <form th:action="@{'/rooms/edit/' + ${roomId}}" th:object="${room}" method="post">

                    <div class="mb-3">
                        <label>room type</label>
                        <select th:field="*{roomType}" class="form-select">

                            <option value="">select room type</option>

                            <option value="SINGLE">Single</option>
                            <option value="STUDIO">Studio</option>
                            <option value="QUEEN">Queen</option>
                            <option value="KING">King</option>

                        </select>
                    </div>

                    <div class="mb-3">
                        <label>price</label>
                        <input type="number" th:field="*{price}" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>description</label>
                        <input type="text" th:field="*{description}" class="form-control">
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" th:field="*{available}" class="form-check-input">
                        <label class="form-check-label">available</label>
                    </div>

                    <button class="btn btn-outline-warning w-100">
                        update room
                    </button>

                </form>

                <a href="/dashboard" class="btn btn-outline-secondary mt-3 w-100">
                    back
                </a>

            </div>

        </div>
    </div>

</div>

</body>
</html>
