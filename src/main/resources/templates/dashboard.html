<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>dashboard</title>

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

    <!-- header -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3>dashboard</h3>

        <div>
            <span class="me-3">welcome <b th:text="${user.name}"></b></span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">logout</a>
        </div>

    </div>

    <!-- admin create button -->
    <a th:if="${user.role == 'admin'}"
       href="/rooms/new"
       class="btn btn-outline-primary mb-3">
        add room
    </a>

    <div class="row">

        <!-- loop rooms -->
        <div class="col-md-4" th:each="room : ${rooms}">

            <div class="card shadow p-3 mb-3">

                <!-- room type -->
                <h5 th:text="${room.roomType}"></h5>

                <!-- description -->
                <p th:text="${room.description}"></p>

                <!-- price -->
                <p>
                    <strong>price:</strong>
                    <span th:text="${room.price}"></span>
                </p>

                <!-- availability -->
                <p th:if="${room.available}" class="text-success">available</p>
                <p th:if="${!room.available}" class="text-danger">unavailable</p>

                <!-- view details -->
                <a th:href="@{'/rooms/' + ${room.id}}"
                   class="btn btn-outline-dark btn-sm mb-2">
                    view room
                </a>

                <!-- customer booking -->
                <a th:if="${user.role == 'customer' and room.available}"
                   th:href="@{'/rooms/book/' + ${room.id}}"
                   class="btn btn-outline-success btn-sm">
                    book now
                </a>

                <button th:if="${user.role == 'customer' and !room.available}"
                        class="btn btn-secondary btn-sm" disabled>
                    unavailable
                </button>

                <!-- admin actions -->
                <div th:if="${user.role == 'admin'}" class="mt-2">

                    <a th:href="@{'/rooms/edit/' + ${room.id}}"
                       class="btn btn-outline-warning btn-sm">
                        edit
                    </a>

                    <a th:href="@{'/rooms/delete/' + ${room.id}}"
                       class="btn btn-outline-danger btn-sm">
                        delete
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
