<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- SIDEBAR -->
<div th:replace="fragments/sidebar :: sidebar"></div>

<!-- MAIN -->
<div class="main-content">

    <!-- NAVBAR -->
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="d-flex justify-content-between mb-3">
        <h4>HOME</h4>
        <span>Welcome <b th:text="${#strings.toUpperCase(user.name)}"></b></span>
    </div>

    <!-- ALERTS -->
    <div th:if="${success}" class="alert alert-success auto-hide">
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger auto-hide">
        <span th:text="${error}"></span>
    </div>

    <form action="/rooms/search" method="get" class="mb-3 d-flex">

        <input type="text"
               name="keyword"
               class="form-control me-2"
               placeholder="Search room type (e.g. Single, Queen)"
               required>

        <button class="btn btn-dark">Search</button>

    </form>

    <!-- ROOMS -->
    <div class="row g-3">

        <div class="col-12 col-md-6 col-lg-4" th:each="room : ${rooms}">

            <div class="card p-3 shadow-sm">

                <h5 th:text="${room.roomType}"></h5>
                <p th:text="${room.description}"></p>

                <p><strong>₦</strong> <span th:text="${room.price}"></span></p>

                <p th:if="${room.available}" class="text-success">AVAILABLE</p>
                <p th:if="${!room.available}" class="text-danger">UNAVAILABLE</p>

                <a th:href="@{'/rooms/' + ${room.id}}"
                   class="btn btn-dark btn-sm w-100">
                    VIEW
                </a>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    setTimeout(() => {
        document.querySelectorAll('.auto-hide').forEach(e => e.style.display='none');
    }, 5000);
</script>

</body>
</html>
