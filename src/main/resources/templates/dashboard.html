<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- sidebar -->
<div class="sidebar">
    <h4>GPH</h4>
    <a href="/dashboard">dashboard</a>
    <a href="/rooms">rooms</a>
    <a href="/bookings/history">booking history</a>
    <a th:if="${user.role == 'admin'}" href="/rooms/new">manage rooms</a>
    <hr>
    <a href="/logout" class="text-danger">logout</a>
</div>

<div class="main-content">

    <!-- navbar -->
    <div class="d-flex justify-content-between mb-3">
        <h3>dashboard</h3>
        <span>welcome <b th:text="${#strings.toUpperCase(user.name)}"></b></span>
    </div>

    <!-- carousel -->
    <div id="carouselExample" class="carousel slide mb-4" data-bs-ride="carousel">
        <div class="carousel-inner">

            <div class="carousel-item active" style="background:url('/images/room1.jpg'); height:250px;">
                <div class="text-white p-4">luxury rooms</div>
            </div>

            <div class="carousel-item" style="background:url('/images/room2.jpg'); height:250px;">
                <div class="text-white p-4">premium comfort</div>
            </div>

        </div>
    </div>

    <a th:if="${user.role == 'admin'}" href="/rooms/new" class="btn btn-primary mb-3">
        add room
    </a>

    <div class="row">

        <div class="col-md-4" th:each="room : ${rooms}">

            <div class="card p-3 shadow mb-3">

                <h5 th:text="${room.roomType}"></h5>
                <p th:text="${room.description}"></p>

                <p><strong>price:</strong> <span th:text="${room.price}"></span></p>

                <p th:if="${room.available}" class="text-success">available</p>
                <p th:if="${!room.available}" class="text-danger">unavailable</p>

                <a th:href="@{'/rooms/' + ${room.id}}" class="btn btn-dark btn-sm mb-2">
                    view room
                </a>

                <!-- customer -->
                <a th:if="${user.role == 'customer' and room.available}"
                   th:href="@{'/bookings/new/' + ${room.id}}"
                   class="btn btn-success btn-sm">
                    book now
                </a>

                <button th:if="${user.role == 'customer' and !room.available}"
                        class="btn btn-secondary btn-sm" disabled>
                    unavailable
                </button>

                <!-- admin -->
                <div th:if="${user.role == 'admin'}">
                    <a th:href="@{'/rooms/edit/' + ${room.id}}" class="btn btn-warning btn-sm">edit</a>
                    <a th:href="@{'/rooms/delete/' + ${room.id}}" class="btn btn-danger btn-sm">delete</a>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    setTimeout(() => {
        document.querySelectorAll('.alert').forEach(e => e.style.display='none');
    }, 5000);
</script>

</body>
</html>
