<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Create User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/sidebar :: sidebar"></div>

<div class="main-content">

    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="card p-4 shadow-sm">

        <h4>CREATE USER</h4>

        <h4>CREATE USER</h4>

        <!-- success message -->
        <div th:if="${success}" class="alert alert-success auto-hide">
            <span th:text="${success}"></span>
        </div>

        <!-- error message -->
        <div th:if="${error}" class="alert alert-danger auto-hide">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/users/create}" th:object="${user}" method="post">

            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" th:field="*{name}" class="form-control mb-2" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control mb-2" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" th:field="*{password}" class="form-control mb-2" required>
            </div>

            <!-- SAFE ROLE CHECK -->
            <label>Role</label>
            <select sec:authorize="hasAnyRole('ADMIN','RECEPTIONIST')"
                    th:field="*{role}"
                    class="form-control mb-3">

                <option value="customer">Customer</option>
                <option value="receptionist">Receptionist</option>

            </select>

            <button class="btn btn-primary w-100">CREATE</button>
            <a href="/dashboard" class="btn btn-secondary mt-3 w-100">BACK</a>

        </form>

    </div>

</div>

<script>
    // wait 5 seconds then hide alerts
    setTimeout(function () {

        // select all elements with class auto-hide
        let alerts = document.querySelectorAll(".auto-hide");

        // loop through them
        alerts.forEach(function (alert) {
            alert.style.display = "none";
        });

    }, 5000);
</script>

</body>
</html>
