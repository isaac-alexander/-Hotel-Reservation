<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h3 class="text-center mb-3">BOOK ROOM</h3>

        <div th:if="${error}" class="alert alert-danger text-center">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/bookings/new}" th:object="${booking}" method="post">

            <input type="hidden" th:field="*{roomId}">

            <div class="mb-3">
                <label>Check In</label>
                <input type="date" th:field="*{checkIn}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Check Out</label>
                <input type="date" th:field="*{checkOut}" class="form-control" required>
            </div>

            <button class="btn btn-success w-100">
                CONFIRM BOOKING
            </button>

        </form>

        <a href="/dashboard" class="btn btn-secondary mt-3 w-100">
            BACK TO HOME
        </a>

    </div>

</div>

</body>
</html>
