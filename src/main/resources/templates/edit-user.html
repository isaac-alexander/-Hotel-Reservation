<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Edit User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="fragments/sidebar :: sidebar"></div>

<div class="main-content">

    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Edit User</h3>
        <a href="/users" class="btn btn-outline-secondary btn-sm">Back to Users</a>
    </div>

    <div class="card p-4 shadow-sm">

        <div th:if="${success}" class="alert alert-success auto-hide">
            <span th:text="${success}"></span>
        </div>

        <div th:if="${error}" class="alert alert-danger auto-hide">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{'/users/edit/' + ${userId}}"
              th:object="${user}"
              method="post">

            <div class="row">

                <div class="col-md-6">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text"
                               th:field="*{name}"
                               class="form-control"
                               placeholder="Enter full name"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email"
                               th:field="*{email}"
                               class="form-control"
                               placeholder="Enter email"
                               required>
                    </div>

                </div>

                <div class="col-md-6">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password"
                               th:field="*{password}"
                               class="form-control"
                               placeholder="New password">
                        <small class="text-muted">
                            Leave empty to keep existing password
                        </small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Role</label>

                        <select sec:authorize="hasAnyRole('ADMIN','RECEPTIONIST')"
                                th:field="*{role}"
                                class="form-control">

                            <option value="customer">Customer</option>
                            <option value="receptionist">Receptionist</option>
                            <option value="admin">Admin</option>

                        </select>
                    </div>

                </div>

            </div>

            <!-- BUTTONS -->
            <div class="mt-4 d-flex gap-2">
                <button class="btn btn-primary w-50">Update User</button>
                <a href="/users" class="btn btn-secondary w-50">Cancel</a>
            </div>

        </form>

    </div>

</div>

<script>
    setTimeout(function () {
        let alerts = document.querySelectorAll(".auto-hide");
        alerts.forEach(function (alert) {
            alert.style.display = "none";
        });
    }, 5000);
</script>

</body>
</html>
